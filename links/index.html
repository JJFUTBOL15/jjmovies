<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJFUTBOL - Enlaces Directos</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #D4AF37;
            --bg: #050508;
            --card: #111118;
            --text: #ffffff;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px; text-align: center;
            width: 100%;
        }

        .logo { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--primary)); }

        h1 { font-size: 24px; font-weight: 900; text-transform: uppercase; margin: 0; }
        p { color: #888; margin-top: 10px; font-size: 14px; }

        .links-container {
            width: 90%; max-width: 500px;
            margin-top: 30px; display: flex; flex-direction: column; gap: 15px;
        }

        .link-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 20px; border-radius: 18px;
            display: flex; align-items: center; justify-content: space-between;
            text-decoration: none; color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .link-card:hover {
            transform: scale(1.03);
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.05);
        }

        .info { display: flex; align-items: center; gap: 15px; }
        .icon-box {
            width: 45px; height: 45px; background: rgba(212, 175, 55, 0.1);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; color: var(--primary); font-size: 20px;
        }

        .details b { display: block; font-size: 16px; margin-bottom: 2px; }
        .details span { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

        .btn-go {
            width: 35px; height: 35px; border-radius: 50%;
            background: #1a1a25; display: flex; align-items: center;
            justify-content: center; color: var(--primary); font-size: 12px;
        }

        .warning {
            margin-top: 40px; width: 85%; max-width: 400px;
            background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 15px; border-radius: 12px; font-size: 12px; color: var(--accent);
            text-align: center; line-height: 1.5;
        }

        footer { margin-top: auto; padding: 40px; opacity: 0.3; font-size: 11px; }
    </style>
</head>
<body>

    <header>
        <img class="logo" src="https://raw.githubusercontent.com/JJFUTBOL15/eventos/main/1762386751.png" alt="JJFUTBOL">
        <h1>Barcelona <span style="color:var(--primary)">vs</span> Atlético</h1>
        <p>Selecciona una opción para ver en directo</p>
    </header>

    <div class="links-container">
        <div class="link-card" onclick="openLink(0)">
            <div class="info">
                <div class="icon-box"><i class="fas fa-bolt"></i></div>
                <div class="details">
                    <b>Opción 1: Evault</b>
                    <span>Alta Calidad - Estable</span>
                </div>
            </div>
            <div class="btn-go"><i class="fas fa-external-link-alt"></i></div>
        </div>

        <div class="link-card" onclick="openLink(1)">
            <div class="info">
                <div class="icon-box"><i class="fas fa-play"></i></div>
                <div class="details">
                    <b>Opción 2: 4Rolls</b>
                    <span>Servidor Rápido</span>
                </div>
            </div>
            <div class="btn-go"><i class="fas fa-external-link-alt"></i></div>
        </div>

        <div class="link-card" onclick="openLink(2)">
            <div class="info">
                <div class="icon-box"><i class="fas fa-satellite-dish"></i></div>
                <div class="details">
                    <b>Opción 3: Velcuri</b>
                    <span>Señal Alternativa</span>
                </div>
            </div>
            <div class="btn-go"><i class="fas fa-external-link-alt"></i></div>
        </div>
    </div>

    <div class="warning">
        <i class="fas fa-info-circle"></i><br>
        Si el enlace abre publicidad, ciérrala y regresa aquí para intentar con otra opción.
    </div>

    <footer>JJFUTBOL PRO &copy; 2026</footer>

    <script>
        // Links en Base64 para que no sean detectados por bots fácilmente
        const DATA_MAP = [
            "aHR0cHM6Ly9lbmxhY2VzLmV2YXVsdGh1Yi5jb20vd2F0Y2gvY29wYS1kZWwtcmV5LWJhcmNlbG9uYS12cy1hdGxldGljby1tYWRyaWQ=",
            "aHR0cHM6Ly9mdXRib2wuNHJvbGxzLmNvbS9tYXRjaC9jb3BhLWRlbC1yZXktYmFyY2Vsb25hLXZzLWF0bHRpY28tbWFkcmlkLTMyMzIyP3NlcnZlcj0w",
            "aHR0cHM6Ly9mdXRib2wudmVsY3VyaS5pby9mb290YmFsbC9iYXJjZWxvbmEtdnMtYXRsZXRpY28tbWFkcmlkLWxpdmUtc3RyZWFt"
        ];

        function openLink(idx) {
            try {
                // Decodifica y abre en pestaña nueva
                const url = atob(DATA_MAP[idx]);
                window.open(url, '_blank', 'noopener,noreferrer');
            } catch (e) {
                console.error("Error al abrir enlace");
            }
        }
    </script>
</body>
</html>
