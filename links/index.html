<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EN VIVO: Barcelona vs Atlético Madrid</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #D4AF37;
            --bg: #050508;
            --card: #111118;
            --text: #ffffff;
            --danger: #ff4444;
            --success: #00ff88;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(to bottom, #0a0a0f, transparent);
        }

        .match-title {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        .live-tag {
            background: var(--danger);
            color: white;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0.5; } }

        .container {
            width: 95%;
            max-width: 1000px;
            margin: 10px auto;
        }

        /* REPRODUCTOR */
        .player-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* BOTONES DE SERVIDORES */
        .server-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .btn-server {
            background: var(--card);
            border: 1px solid #333;
            color: white;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .btn-server.active {
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.1);
        }

        .btn-server:hover {
            transform: translateY(-3px);
            background: #1a1a25;
        }

        .btn-server span {
            font-size: 10px;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* CONTROLES EXTRA */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
        }

        .shield-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
        }

        .refresh-btn {
            background: transparent;
            border: 1px solid #444;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            font-size: 12px;
            color: #555;
        }

        @media (max-width: 600px) {
            .match-title { font-size: 18px; }
            .server-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="live-tag">LIVE - COPA DEL REY</div>
        <h1 class="match-title">Barcelona <span style="color:var(--primary)">vs</span> Atlético Madrid</h1>
    </header>

    <div class="container">
        
        <div class="player-wrapper">
            <iframe id="main-player" 
                    src="https://enlaces.evaulthub.com/watch/copa-del-rey-barcelona-vs-atletico-madrid" 
                    allowfullscreen 
                    sandbox="allow-forms allow-scripts allow-same-origin allow-pointer-lock">
            </iframe>
        </div>

        <div class="controls">
            <div class="shield-toggle" onclick="toggleShield()">
                <i id="shield-icon" class="fas fa-shield-alt" style="color:var(--success)"></i>
                <span>ESCUDO ANTI-ADS: <b id="shield-status" style="color:var(--success)">ON</b></span>
            </div>
            <button class="refresh-btn" onclick="reloadPlayer()">
                <i class="fas fa-sync-alt"></i> RECARGAR
            </button>
        </div>

        <div class="server-list">
            <div class="btn-server active" onclick="changeServer(this, 'https://enlaces.evaulthub.com/watch/copa-del-rey-barcelona-vs-atletico-madrid')">
                <span>Servidor 1</span>
                OPCIÓN ESTABLE
            </div>
            <div class="btn-server" onclick="changeServer(this, 'https://futbol.4rolls.com/match/copa-del-rey-barcelona-vs-atltico-madrid-32322?server=0')">
                <span>Servidor 2</span>
                OPCIÓN RÁPIDA
            </div>
            <div class="btn-server" onclick="changeServer(this, 'https://futbol.velcuri.io/football/barcelona-vs-atletico-madrid-live-stream')">
                <span>Servidor 3</span>
                OPCIÓN ALTERNA
            </div>
        </div>

    </div>

    <footer>
        JJFUTBOL - Todos los derechos reservados &copy; 2026<br>
        Se recomienda conexión Wi-Fi para mejor estabilidad.
    </footer>

    <script>
        let currentUrl = "https://enlaces.evaulthub.com/watch/copa-del-rey-barcelona-vs-atletico-madrid";
        let isShieldOn = true;

        function changeServer(btn, url) {
            currentUrl = url;
            // UI
            document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Cargar
            reloadPlayer();
        }

        function reloadPlayer() {
            const iframe = document.getElementById('main-player');
            iframe.src = "about:blank"; // Limpiar
            setTimeout(() => {
                iframe.src = currentUrl;
            }, 100);
        }

        function toggleShield() {
            isShieldOn = !isShieldOn;
            const iframe = document.getElementById('main-player');
            const statusText = document.getElementById('shield-status');
            const icon = document.getElementById('shield-icon');

            if(isShieldOn) {
                iframe.setAttribute("sandbox", "allow-forms allow-scripts allow-same-origin allow-pointer-lock");
                statusText.innerText = "ON";
                statusText.style.color = "var(--success)";
                icon.style.color = "var(--success)";
                icon.className = "fas fa-shield-alt";
            } else {
                iframe.removeAttribute("sandbox");
                statusText.innerText = "OFF";
                statusText.style.color = "var(--danger)";
                icon.style.color = "var(--danger)";
                icon.className = "fas fa-shield-virus";
            }
            reloadPlayer();
        }
    </script>
</body>
</html>
