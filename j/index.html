<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <meta name="referrer" content="no-referrer" />
  
  <title>Ver ESPN+ | JJFUTBOL</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --blue-dark: #0A0F2C;
      --gold: #D4AF37;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, var(--blue-dark) 0%, #000000 100%);
      color: white;
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }

    .main-container {
      width: 100%; max-width: 900px;
      display: flex; flex-direction: column; gap: 20px;
      align-items: center;
    }

    .channel-title { 
      font-family: 'Poppins', sans-serif; font-size: 2rem; 
      color: var(--gold); text-transform: uppercase; text-align: center;
    }

    /* CONTENEDOR DEL REPRODUCTOR */
    .video-box {
      position: relative; width: 100%; padding-bottom: 56.25%; /* Relación 16:9 */
      background: #000; border-radius: 18px; overflow: hidden;
      box-shadow: 0 15px 50px rgba(0,0,0,0.8);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    iframe {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border: none; z-index: 1;
    }

    /* EL ESCUDO ANTI-ANUNCIOS (Absorbe el primer clic) */
    .click-shield {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 15; background: transparent; cursor: pointer;
    }

    .shield-message {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85); padding: 15px 25px; border-radius: 30px;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
      color: var(--gold); font-weight: bold; font-size: 16px; text-align: center;
      border: 2px solid var(--gold); z-index: 16;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
    }
    
    .click-shield:hover + .shield-message { opacity: 1; }

    @media (max-width: 600px) {
      .video-box { padding-bottom: 0; height: 260px; }
      .channel-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="main-container">
    <h1 class="channel-title">ESPN+ EN VIVO</h1>

    <div class="video-box">
      <div id="click-shield" class="click-shield" onclick="removeShield()"></div>
      <div class="shield-message" id="shield-msg">
        <i class="fas fa-play"></i> Haz Clic para Ver (y saltar anuncio)
      </div>
      
      <iframe src="https://streamtp10.com/global1.php?stream=espnplus2" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
  </div>

  <script>
    // Al hacer el primer clic, el escudo intercepta la ventana emergente y se borra
    function removeShield() {
      document.getElementById('click-shield').style.display = 'none';
      document.getElementById('shield-msg').style.display = 'none';
    }
  </script>

</body>
</html>
